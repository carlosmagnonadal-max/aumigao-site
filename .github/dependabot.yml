# Dependabot — aumigao-site (Next.js / site público)
# Atualizações de versão + alertas de segurança automáticos.
# Docs: https://docs.github.com/code-security/dependabot
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    # Cooldown anti-supply-chain: versões maliciosas (axios mar/2026, chalk set/2025)
    # viveram ~3h no registry; esperar 7 dias antes de adotar release nova neutraliza isso.
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
    # Agrupa patch/minor num PR só; majors (Next/React) vêm separados p/ revisão.
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
